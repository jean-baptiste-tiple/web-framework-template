name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      # La version de pnpm vient de "packageManager" dans package.json.
      # Ne PAS remettre `with: version`, sinon conflit ERR_PNPM_BAD_PM_VERSION.
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      # astro check (types + frontmatter Zod) puis build statique : attrape
      # frontmatter invalide, lien de collection cassé, erreur de génération.
      - run: pnpm build
